version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: geoint_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geoint}
      POSTGRES_USER: ${POSTGRES_USER:-geoint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoint_secret}
      PGPORT: 5466
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5466:5466"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geoint} -p 5466"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geoint_net

  redis:
    image: redis:7-alpine
    container_name: geoint_redis
    command: redis-server --appendonly yes --port 6366
    volumes:
      - redis_data:/data
    ports:
      - "6366:6366"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6366", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - geoint_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: geoint_backend
    environment:
      NODE_ENV: development
      PORT: 3661
      DATABASE_URL: postgresql://${POSTGRES_USER:-geoint}:${POSTGRES_PASSWORD:-geoint_secret}@postgres:5466/${POSTGRES_DB:-geoint}
      REDIS_URL: redis://redis:6366
      OPENSKY_CLIENT_ID: ${OPENSKY_CLIENT_ID:-}
      OPENSKY_CLIENT_SECRET: ${OPENSKY_CLIENT_SECRET:-}
      OPENSKY_USERNAME: ${OPENSKY_USERNAME:-}
      OPENSKY_PASSWORD: ${OPENSKY_PASSWORD:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3666}
      FLIGHT_POLL_INTERVAL: ${FLIGHT_POLL_INTERVAL:-10000}
      WINDY_API_KEY: ${WINDY_API_KEY:-}
      WEBCAMS_TRAVEL_KEY: ${WEBCAMS_TRAVEL_KEY:-}
      # Ollama — runs on host machine, accessible via host.docker.internal
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:e4b}
      AI_NEWS_ENABLED: ${AI_NEWS_ENABLED:-false}
      AI_NEWS_INTERVAL: ${AI_NEWS_INTERVAL:-600000}
      AI_NUM_PREDICT: ${AI_NUM_PREDICT:-400}
      AI_MAX_ALERTS: ${AI_MAX_ALERTS:-8}
      AI_NUM_CTX: ${AI_NUM_CTX:-1024}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.3}
      AI_KEEP_ALIVE: ${AI_KEEP_ALIVE:-0}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-60000}
      AI_BACKGROUND_INTERVAL: ${AI_BACKGROUND_INTERVAL:-3600000}
      AI_BACKGROUND_FIRST: ${AI_BACKGROUND_FIRST:-1800000}
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    ports:
      - "3661:3661"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - geoint_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: geoint_frontend
    environment:
      NODE_ENV: development
      # Server-side proxy target (container-to-container)
      BACKEND_URL: http://backend:3661
      # Client-side: empty = use relative /api/* URLs proxied by Next.js
      NEXT_PUBLIC_API_URL: ""
      # WebSocket must connect directly to backend (can't proxy WS through Next.js)
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3661}
      NEXT_PUBLIC_MAPTILER_KEY: ${MAPTILER_KEY:-}
      NEXT_PUBLIC_WINDY_FORECAST_KEY: ${WINDY_FORECAST_KEY:-}
      NEXT_PUBLIC_WINDY_KEY: ${WINDY_API_KEY:-}
      NEXT_PUBLIC_THUNDERFOREST_KEY: ${THUNDERFOREST_KEY:-}
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
      - frontend_next:/app/.next
    ports:
      - "3666:3666"
    depends_on:
      - backend
    networks:
      - geoint_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: geoint_nginx
    volumes:
      - ./infra/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8066:80"
    depends_on:
      - frontend
      - backend
    networks:
      - geoint_net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_modules:
  frontend_modules:
  frontend_next:

networks:
  geoint_net:
    driver: bridge
