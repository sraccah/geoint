<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Space background -->
  <circle cx="16" cy="16" r="16" fill="#020508"/>
  <!-- Globe atmosphere glow -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Globe body -->
  <circle cx="16" cy="16" r="11" fill="#0a1520"/>
  <!-- Land masses (simplified) -->
  <ellipse cx="13" cy="13" rx="4" ry="3" fill="#0d2137" transform="rotate(-20 13 13)"/>
  <ellipse cx="20" cy="12" rx="3" ry="2.5" fill="#0d2137" transform="rotate(10 20 12)"/>
  <ellipse cx="18" cy="19" rx="2.5" ry="2" fill="#0d2137"/>
  <ellipse cx="11" cy="19" rx="2" ry="3" fill="#0d2137" transform="rotate(15 11 19)"/>
  <!-- Latitude lines -->
  <ellipse cx="16" cy="16" rx="11" ry="4" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>
  <ellipse cx="16" cy="16" rx="11" ry="8" fill="none" stroke="#00d4ff" stroke-width="0.4" opacity="0.2"/>
  <!-- Longitude line -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#00d4ff" stroke-width="0.4" opacity="0.3"/>
  <!-- Globe outline -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#00d4ff" stroke-width="1"/>
  <!-- Cyan glow dot (north pole indicator) -->
  <circle cx="16" cy="5.5" r="1.2" fill="#00d4ff" opacity="0.8"/>
</svg>
